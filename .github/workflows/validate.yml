name: Validate
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  validate:
    uses: Bre77/splunk_nats/.github/workflows/_reusable-build-appinspect.yml@main
    with:
      app_dir: "."
      use_ucc_gen: false
      build_command: "./.build.sh"
      package_glob: "../*.spl"
      splunk_python_version: "3.9"
      fail_on: "errors"
